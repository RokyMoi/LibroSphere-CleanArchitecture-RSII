name: librosphere_desktop
description: "LibroSphere admin desktop"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.2
  http: ^1.5.0
