services:
  librosphere.api:
    image: ${DOCKER_REGISTRY-}librosphereapi
    container_name: LibroSphere.Api
    build:
      context: .
      dockerfile: src/LibroSphere.WebApi/Dockerfile
    depends_on:
      - librosphere-db
      - librosphere-idp

  librosphere-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: LibroSphere.Db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Pass123
    ports:
      - 1433:1433
    volumes:
      - ./.containers/mssql:/var/opt/mssql

  librosphere-idp:
    image: jboss/keycloak:latest
    container_name: LibroSphere.Identity
    environment:
      - KEYCLOAK_USER=admin
      - KEYCLOAK_PASSWORD=admin
      - KEYCLOAK_IMPORT=/tmp/librosphere-realm-export.json
    volumes:
      - ./.containers/identity:/opt/jboss/keycloak/standalone/data
      - ./.files/librosphere-realm-export.json:/tmp/librosphere-realm-export.json
    ports:
      - 18080:8080