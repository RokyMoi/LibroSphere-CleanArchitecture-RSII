services:
  librosphere-api:
    image: ${DOCKER_REGISTRY-}librosphereapi
    container_name: LibroSphere.Api
    build:
      context: .
      dockerfile: src/LibroSphere.WebApi/Dockerfile
    depends_on:
      - librosphere-db
      

  librosphere-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: LibroSphere.Db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Pass123"
      MSSQL_SA_PASSWORD: "YourStrong!Pass123"
    ports:
      - "1433:1433"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - mssql-data:/var/opt/mssql

  
volumes:
  mssql-data: