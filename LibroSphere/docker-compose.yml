version: '3.8'

services:
  librosphere-api:
    image: ${DOCKER_REGISTRY-}librosphereapi
    container_name: LibroSphere.Api
    build:
      context: .
      dockerfile: src/LibroSphere.WebApi/Dockerfile
    depends_on:
      - librosphere-db
      - rabbitmq      

  librosphere-worker:   
    image: ${DOCKER_REGISTRY-}librosphereworker
    container_name: LibroSphere.Worker
    build:
      context: .
      dockerfile: src/LibroSphere.Worker/Dockerfile  
    depends_on:
      - rabbitmq        
    environment:
      - RabbitMQ__Host=librosphere-rabbitmq  
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: librosphere-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  librosphere-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: LibroSphere.Db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Pass123"
      MSSQL_SA_PASSWORD: "YourStrong!Pass123"
    ports:
      - "1433:1433"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - mssql-data:/var/opt/mssql

volumes:
  mssql-data:
  redis-data:
  rabbitmq_data:  